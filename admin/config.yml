backend:
  name: github
  repo: MikeJonckheere/it-mike-website
  branch: main
  base_url: https://it-mike.be
  auth_endpoint: api/auth

media_folder: "fotos"
public_folder: "fotos"

locale: "nl"

collections:
  - name: "website"
    label: "Website inhoud"
    files:

      - name: "home"
        label: "Teksten & Media"
        file: "content/site.json"
        format: "json"
        fields:

          - label: "📍 Locatie (hero)"
            name: "hero_location"
            widget: "string"
            hint: "Bijv: Ardooie — West-Vlaanderen"

          - label: "📝 Hero subtekst"
            name: "hero_subtitle"
            widget: "text"
            hint: "De tekst onder de hoofdtitel in het hero blok"

          - label: "👤 Over mij — alinea 1"
            name: "about_1"
            widget: "text"

          - label: "👤 Over mij — alinea 2"
            name: "about_2"
            widget: "text"

          - label: "🎬 Profielfoto of -video"
            name: "profile_media"
            widget: "file"
            required: false
            hint: "Upload een foto (jpg/png) of video (webm/mp4) van jezelf"
            media_library:
              config:
                multiple: false

          - label: "📞 Telefoonnummer"
            name: "contact_phone"
            widget: "string"
            hint: "Formaat: +32496797671"

          - label: "✉️ E-mailadres"
            name: "contact_email"
            widget: "string"

          - label: "🔧 Dienst 1 — Titel"
            name: "d1_title"
            widget: "string"
            hint: "Bv: IT-Support & Helpdesk"

          - label: "🔧 Dienst 1 — Omschrijving"
            name: "d1_desc"
            widget: "text"

          - label: "💻 Dienst 2 — Titel"
            name: "d2_title"
            widget: "string"

          - label: "💻 Dienst 2 — Omschrijving"
            name: "d2_desc"
            widget: "text"

          - label: "💡 Dienst 3 — Titel"
            name: "d3_title"
            widget: "string"

          - label: "💡 Dienst 3 — Omschrijving"
            name: "d3_desc"
            widget: "text"

          - label: "🖥️ Dienst 4 — Titel"
            name: "d4_title"
            widget: "string"

          - label: "🖥️ Dienst 4 — Omschrijving"
            name: "d4_desc"
            widget: "text"
